# TenshiSTEP — rEFInd boot theme (visually coherent with the TenshiSTEP
# Plasma theme). Enable by adding this line to /EFI/refind/refind.conf:
#   include themes/TenshiSTEP-dark/theme.conf

banner          themes/TenshiSTEP-dark/background.png
banner_scale    fillscreen

selection_big   themes/TenshiSTEP-dark/selection_big.png
selection_small themes/TenshiSTEP-dark/selection_small.png

icons_dir       themes/TenshiSTEP-dark/icons
big_icon_size   128
small_icon_size 48

# cleaner NeXT-style menu
hideui          hints
