<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160" height="16">
  <!-- NeXT square button, raised bevel; glyph = shade. States laid out in a row. -->

  <g id="shade" transform="translate(0,0)">
