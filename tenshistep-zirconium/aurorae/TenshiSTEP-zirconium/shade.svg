    <rect x="1" y="14" width="16" height="1" fill="#5c5e60"/>
    <rect x="16" y="1" width="1" height="14" fill="#5c5e60"/>
    <path d="M4 5 L14 5" stroke="#000000" stroke-width="2.6" stroke-linecap="round" fill="none"/>
    <path d="M4 12 L14 12" stroke="#000000" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  </g>

  <g id="hover-center" transform="translate(44,0)">
