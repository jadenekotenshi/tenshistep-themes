<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="400" height="400">
  <!-- NeXTSTEP Aurorae decoration: contiguous column-aligned 3x3 grid,
       corners == edge width (no gutter). 2px side frame, uniform raised
       resize bar. Active grid at (10,10); inactive +200px; maximized below. -->

  <!-- ===================== ACTIVE ===================== -->
  <g id="decoration-topleft" transform="translate(10,10)">
    <rect x="0" y="0" width="1" height="24" fill="#1a1a1a"/>
    <rect x="1" y="0" width="1" height="24" fill="#3b4048"/>
    <rect x="1" y="0" width="1" height="1" fill="#1a1a1a"/>
    <rect x="1" y="1" width="1" height="1" fill="#565d67"/>
    <rect x="1" y="22" width="1" height="1" fill="#14161a"/>
    <rect x="1" y="23" width="1" height="1" fill="#1a1a1a"/>
  </g>

  <g id="decoration-top" transform="translate(12,10)">
    <rect x="0" y="0" width="20" height="24" fill="#3b4048"/>
    <rect x="0" y="0" width="20" height="1" fill="#1a1a1a"/>
    <rect x="0" y="1" width="20" height="1" fill="#565d67"/>
    <rect x="0" y="22" width="20" height="1" fill="#14161a"/>
    <rect x="0" y="23" width="20" height="1" fill="#1a1a1a"/>
  </g>

  <g id="decoration-topright" transform="translate(32,10)">
    <rect x="1" y="0" width="1" height="24" fill="#1a1a1a"/>
    <rect x="0" y="0" width="1" height="24" fill="#3b4048"/>
    <rect x="0" y="0" width="1" height="1" fill="#1a1a1a"/>
    <rect x="0" y="1" width="1" height="1" fill="#565d67"/>
    <rect x="0" y="22" width="1" height="1" fill="#14161a"/>
    <rect x="0" y="23" width="1" height="1" fill="#1a1a1a"/>
  </g>

  <g id="decoration-left" transform="translate(10,34)">
    <rect x="0" y="0" width="1" height="20" fill="#1a1a1a"/>
    <rect x="1" y="0" width="1" height="20" fill="#14161a"/>
  </g>

  <g id="decoration-center" transform="translate(12,34)">
    <rect x="0" y="0" width="20" height="20" fill="#3b4048"/>
  </g>

  <g id="decoration-right" transform="translate(32,34)">
    <rect x="1" y="0" width="1" height="20" fill="#1a1a1a"/>
    <rect x="0" y="0" width="1" height="20" fill="#14161a"/>
  </g>

  <g id="decoration-bottomleft" transform="translate(10,54)">
    <rect x="0" y="0" width="1" height="8" fill="#1a1a1a"/>
    <rect x="1" y="0" width="1" height="8" fill="#3b4048"/>
    <rect x="1" y="0" width="1" height="1" fill="#14161a"/>
    <rect x="1" y="6" width="1" height="1" fill="#14161a"/>
    <rect x="1" y="7" width="1" height="1" fill="#1a1a1a"/>
  </g>

  <g id="decoration-bottom" transform="translate(12,54)">
    <rect x="0" y="0" width="20" height="8" fill="#3b4048"/>
    <rect x="0" y="0" width="20" height="1" fill="#14161a"/>
    <rect x="0" y="6" width="20" height="1" fill="#14161a"/>
    <rect x="0" y="7" width="20" height="1" fill="#1a1a1a"/>
  </g>

  <g id="decoration-bottomright" transform="translate(32,54)">
    <rect x="1" y="0" width="1" height="8" fill="#1a1a1a"/>
    <rect x="0" y="0" width="1" height="8" fill="#3b4048"/>
    <rect x="0" y="0" width="1" height="1" fill="#14161a"/>
    <rect x="0" y="6" width="1" height="1" fill="#14161a"/>
    <rect x="0" y="7" width="1" height="1" fill="#1a1a1a"/>
  </g>

  <!-- ===================== INACTIVE ===================== -->
  <g id="decoration-inactive-topleft" transform="translate(210,10)">
    <rect x="0" y="0" width="1" height="24" fill="#26282c"/>
    <rect x="1" y="0" width="1" height="24" fill="#3d4045"/>
    <rect x="1" y="0" width="1" height="1" fill="#26282c"/>
    <rect x="1" y="1" width="1" height="1" fill="#494e56"/>
    <rect x="1" y="22" width="1" height="1" fill="#212327"/>
    <rect x="1" y="23" width="1" height="1" fill="#26282c"/>
  </g>

  <g id="decoration-inactive-top" transform="translate(212,10)">
    <rect x="0" y="0" width="20" height="24" fill="#3d4045"/>
    <rect x="0" y="0" width="20" height="1" fill="#26282c"/>
    <rect x="0" y="1" width="20" height="1" fill="#494e56"/>
    <rect x="0" y="22" width="20" height="1" fill="#212327"/>
    <rect x="0" y="23" width="20" height="1" fill="#26282c"/>
  </g>

  <g id="decoration-inactive-topright" transform="translate(232,10)">
    <rect x="1" y="0" width="1" height="24" fill="#26282c"/>
    <rect x="0" y="0" width="1" height="24" fill="#3d4045"/>
    <rect x="0" y="0" width="1" height="1" fill="#26282c"/>
    <rect x="0" y="1" width="1" height="1" fill="#494e56"/>
    <rect x="0" y="22" width="1" height="1" fill="#212327"/>
    <rect x="0" y="23" width="1" height="1" fill="#26282c"/>
  </g>

  <g id="decoration-inactive-left" transform="translate(210,34)">
    <rect x="0" y="0" width="1" height="20" fill="#26282c"/>
    <rect x="1" y="0" width="1" height="20" fill="#212327"/>
  </g>

  <g id="decoration-inactive-center" transform="translate(212,34)">
    <rect x="0" y="0" width="20" height="20" fill="#3d4045"/>
  </g>

  <g id="decoration-inactive-right" transform="translate(232,34)">
    <rect x="1" y="0" width="1" height="20" fill="#26282c"/>
    <rect x="0" y="0" width="1" height="20" fill="#212327"/>
  </g>

  <g id="decoration-inactive-bottomleft" transform="translate(210,54)">
    <rect x="0" y="0" width="1" height="8" fill="#26282c"/>
    <rect x="1" y="0" width="1" height="8" fill="#3d4045"/>
    <rect x="1" y="0" width="1" height="1" fill="#212327"/>
    <rect x="1" y="6" width="1" height="1" fill="#212327"/>
    <rect x="1" y="7" width="1" height="1" fill="#26282c"/>
  </g>

  <g id="decoration-inactive-bottom" transform="translate(212,54)">
    <rect x="0" y="0" width="20" height="8" fill="#3d4045"/>
    <rect x="0" y="0" width="20" height="1" fill="#212327"/>
    <rect x="0" y="6" width="20" height="1" fill="#212327"/>
    <rect x="0" y="7" width="20" height="1" fill="#26282c"/>
  </g>

  <g id="decoration-inactive-bottomright" transform="translate(232,54)">
    <rect x="1" y="0" width="1" height="8" fill="#26282c"/>
    <rect x="0" y="0" width="1" height="8" fill="#3d4045"/>
    <rect x="0" y="0" width="1" height="1" fill="#212327"/>
    <rect x="0" y="6" width="1" height="1" fill="#212327"/>
    <rect x="0" y="7" width="1" height="1" fill="#26282c"/>
  </g>

  <!-- ============ MAXIMIZED (center-only, opaque) ============ -->
  <g id="decoration-maximized-center" transform="translate(10,150)">
    <rect x="0" y="0" width="40" height="24" fill="#3b4048"/>
    <rect x="0" y="0" width="40" height="1" fill="#565d67"/>
    <rect x="0" y="23" width="40" height="1" fill="#1a1a1a"/>
  </g>
  <g id="decoration-maximized-opaque-center" transform="translate(60,150)">
    <rect x="0" y="0" width="40" height="24" fill="#3b4048"/>
    <rect x="0" y="0" width="40" height="1" fill="#565d67"/>
    <rect x="0" y="23" width="40" height="1" fill="#1a1a1a"/>
  </g>
  <g id="decoration-maximized-inactive-center" transform="translate(10,190)">
    <rect x="0" y="0" width="40" height="24" fill="#3d4045"/>
    <rect x="0" y="0" width="40" height="1" fill="#494e56"/>
    <rect x="0" y="23" width="40" height="1" fill="#26282c"/>
  </g>
  <g id="decoration-maximized-opaque-inactive-center" transform="translate(60,190)">
    <rect x="0" y="0" width="40" height="24" fill="#3d4045"/>
    <rect x="0" y="0" width="40" height="1" fill="#494e56"/>
    <rect x="0" y="23" width="40" height="1" fill="#26282c"/>
  </g>
</svg>
