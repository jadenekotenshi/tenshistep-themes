<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="2 2 44 44">
  <!-- PCB board -->
  <rect x="6" y="10" width="34" height="26" rx="1.5" fill="#9cafc4" stroke="#cdd1d7" stroke-width="1.6"/>
  <path d="M7.5 11.5 H38.5" fill="none" stroke="#ffffff" stroke-width="1"/>
  <path d="M7.5 34.5 H38.5" fill="none" stroke="#5d6975" stroke-width="1"/>
  <!-- bracket / backplate on right -->
  <rect x="40" y="8" width="3" height="32" fill="#b0b0b0" stroke="#cdd1d7" stroke-width="1.6"/>
  <!-- audio jacks (colored) -->
  <circle cx="43" cy="14" r="1.8" fill="#5fd07a" stroke="#cdd1d7" stroke-width="1.2"/>
  <circle cx="43" cy="21" r="1.8" fill="#3daee9" stroke="#cdd1d7" stroke-width="1.2"/>
  <circle cx="43" cy="28" r="1.8" fill="#e05a5a" stroke="#cdd1d7" stroke-width="1.2"/>
  <!-- chip -->
  <rect x="12" y="16" width="12" height="12" rx="1" fill="#31353c" stroke="#cdd1d7" stroke-width="1.4"/>
  <path d="M13.5 17.5 H22.5" fill="none" stroke="#5d6975" stroke-width="1"/>
  <!-- capacitors -->
  <circle cx="30" cy="18" r="2.4" fill="#5d6975" stroke="#cdd1d7" stroke-width="1.2"/>
  <circle cx="34" cy="24" r="2.4" fill="#5d6975" stroke="#cdd1d7" stroke-width="1.2"/>
  <!-- gold edge connector -->
  <rect x="8" y="36" width="18" height="4" fill="#d3b64f" stroke="#cdd1d7" stroke-width="1.4"/>
  <path d="M11 36 V40 M14 36 V40 M17 36 V40 M20 36 V40 M23 36 V40" stroke="#cdd1d7" stroke-width="1"/>
</svg>
