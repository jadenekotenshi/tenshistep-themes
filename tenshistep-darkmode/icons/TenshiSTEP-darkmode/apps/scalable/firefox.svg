<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="2 2 44 44">
  <!-- TenshiSTEP Firefox: fiery fox curling around a prominent blue globe -->
  <!-- prominent blue globe -->
  <circle cx="25" cy="28" r="15" fill="#2e6cae" stroke="#cdd1d7" stroke-width="1.6"/>
  <g fill="none" stroke="#6aa0d8" stroke-width="1.1">
    <ellipse cx="25" cy="28" rx="5" ry="15"/>
    <path d="M10 28 H40 M12.5 21 H37.5 M12.5 35 H37.5"/>
  </g>
  <path d="M15 16 A15 15 0 0 0 11 29" fill="none" stroke="#a9cdec" stroke-width="1.4" opacity="0.7"/>

  <!-- fox body + flaming tail: wraps the top and right of the globe -->
  <path d="M18 18 C24 14 30 14 34 18 C40 13 46 19 44 28 C43 33 40 37 35 38
           C38 33 37 27 32 26 C34 30 33 34 30 34 C30 29 26 25 21 26
           C23 22 22 19 18 18 Z"
        fill="#d8381a" stroke="#cdd1d7" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M19.5 19.5 C25 16.5 30 17 33.5 20.5 C39 16 43.5 21 42 28 C41 32 38.5 34.5 35 35.5
           C37 31 36 27 32 26 C33 29 32.5 31 30.5 31.5 C30 27.5 26.5 25 22 26
           C23.5 22.5 22.5 20.5 19.5 19.5 Z"
        fill="#f4791e"/>
  <path d="M24 17 C30 16 36 20 38 26 C35 21 29 19 24 20 Z" fill="#ffc21e"/>

  <!-- fox head (profile, facing left) -->
  <path d="M20.5 18 C14 15.5 8 19.5 6.5 26.5 L3.5 27 C3.3 30 5.5 31.6 8.5 31.8
           C13.5 32.2 18.8 29.8 21 24.5 C22 21.5 22.8 19.2 20.5 18 Z"
        fill="#f2701c" stroke="#cdd1d7" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- ear (broad-based, tipped back over the head) -->
  <path d="M13 17 Q15 9 17 8.5 Q20 12 21.5 17 Z" fill="#f2701c" stroke="#cdd1d7" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M14.8 15.8 Q16.3 11 17.4 11 Q19 13.5 19.7 15.8 Z" fill="#c9351a"/>
  <!-- white muzzle -->
  <path d="M4 27.6 C7.5 30 12 30 15.5 27.8 C12.5 31 7 31 4 27.6 Z" fill="#ffe9c6"/>
  <!-- eye -->
  <ellipse cx="12" cy="23" rx="1.9" ry="1.3" fill="#1a1a1a" transform="rotate(-15 12 23)"/>
  <circle cx="12.7" cy="22.5" r="0.5" fill="#ffffff"/>
  <!-- nose -->
  <circle cx="4.4" cy="26.8" r="1.7" fill="#1a1a1a"/>
</svg>
