<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="160" height="16">
  <!-- NeXT square button, raised bevel; glyph = alldesktops. States laid out in a row. -->

  <g id="alldesktops" transform="translate(0,0)">
    <rect x="0" y="0" width="18" height="16" fill="#000000" fill-opacity="0"/>
    <rect x="0" y="0" width="18" height="16" fill="#1a1a1a"/>
    <rect x="1" y="1" width="16" height="14" fill="#a6adb8"/>
    <rect x="1" y="1" width="16" height="1"  fill="#ffffff"/>
    <rect x="1" y="1" width="1"  height="14" fill="#ffffff"/>
    <rect x="1" y="14" width="16" height="1" fill="#5c626b"/>
    <rect x="16" y="1" width="1" height="14" fill="#5c626b"/>
    <rect x="5" y="5" width="3" height="3" fill="#000000"/>
    <rect x="9" y="5" width="3" height="3" fill="#000000"/>
    <rect x="5" y="9" width="3" height="3" fill="#000000"/>
    <rect x="9" y="9" width="3" height="3" fill="#000000"/>
  </g>

  <g id="active-center" transform="translate(22,0)">
