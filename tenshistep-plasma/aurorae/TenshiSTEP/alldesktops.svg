    <rect x="1" y="14" width="16" height="1" fill="#5c626b"/>
    <rect x="16" y="1" width="1" height="14" fill="#5c626b"/>
    <rect x="5" y="5" width="3" height="3" fill="#000000"/>
    <rect x="9" y="5" width="3" height="3" fill="#000000"/>
    <rect x="5" y="9" width="3" height="3" fill="#000000"/>
    <rect x="9" y="9" width="3" height="3" fill="#000000"/>
  </g>

  <g id="hover-center" transform="translate(44,0)">
